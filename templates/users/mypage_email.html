{% extends "base.html" %}
{% block content %}
<div style="padding: 16px;">

  <p style="font-size: 15px; margin-bottom: 20px;">メールアドレス変更</p>

  {% if form.errors %}
    <p style="color:#b85c5c; margin-bottom:12px;">入力内容に誤りがあります。</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div style="margin-bottom: 8px;">
      <label style="font-size:13px;">新しいメールアドレス</label>
    </div>
    {{ form.email }}
    {% for error in form.email.errors %}
      <p style="color:#b85c5c; font-size:12px; margin-top:4px;">{{ error }}</p>
    {% endfor %}
    <p style="font-size:12px; color:#888; margin-top:6px; margin-bottom:24px;">
      ※入力したメールアドレスに確認用URLを送信します。URLをクリックしていただくと変更が完了します。
    </p>

    <div style="text-align:center;">
      <button type="submit" style="width:80%; padding:14px; background:#5a7a5a; color:white; font-size:15px; border:none; border-radius:8px; cursor:pointer;">
        メール送信
      </button>
    </div>
  </form>

</div>
{% endblock %}

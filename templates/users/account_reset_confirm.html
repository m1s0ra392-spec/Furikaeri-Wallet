{% extends "base.html" %}
{% block content %}

<h2>アカウント設定</h2>

<!-- リセットボタン（これを押すとモーダルが開く） -->
<button type="button" onclick="document.getElementById('resetModal').style.display='flex'">
  データをリセットする
</button>

<!-- モーダル本体（最初は非表示） -->
<div id="resetModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:100;">

  <div style="background:#fff; border-radius:12px; padding:24px; width:80%; max-width:320px;">
    
    <h3 style="margin-top:0;">本当にリセットしますか？</h3>

    <p style="font-size:14px;">
      以下のデータが<strong>すべて削除</strong>されます。
    </p>
    <ul style="font-size:14px;">
      <li>得・損の記録（全件）</li>
      <li>自分で追加したカテゴリ</li>
    </ul>
    <p style="font-size:12px; color:#e00;">
      ※この操作は取り消せません。
    </p>

    <!-- フォームはモーダルの外ではなく、ここに直接書く -->
    <form method="post" action="{% url 'users:account_reset_execute' %}">
      {% csrf_token %}
      <button type="submit"
              style="background:#c00; color:#fff; border:none; border-radius:8px;
                     padding:10px 16px; width:100%; margin-bottom:8px;">
        はい、リセットする
      </button>
    </form>

    <button type="button"
            onclick="document.getElementById('resetModal').style.display='none'"
            style="background:#eee; border:none; border-radius:8px;
                   padding:10px 16px; width:100%;">
      キャンセル
    </button>

  </div>
</div>

{% endblock %}

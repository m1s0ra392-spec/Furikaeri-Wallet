{% extends "base_board.html" %}
{% block board_content %}

<style>
  /* カテゴリタブ（topic_listと共通スタイル） */
  .tab-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin: 12px 0;
    scrollbar-width: none;
  }
  .tab-scroll::-webkit-scrollbar { display: none; }
  .tab-item {
    white-space: nowrap;
    padding: 6px 14px;
    border: 1px solid #ccc;
    border-radius: 20px;
    text-decoration: none;
    color: #333;
    font-size: 13px;
    flex-shrink: 0;
    cursor: pointer;
    background: #fff;
  }
  .tab-item.active {
    background: #d6e8d0;
    color: #3a5a3a;
    border-color: #d6e8d0;
    font-weight: bold;
  }

  /* 検索ボックス */
  .search-box {
    display: flex;
    align-items: center;
    border-radius: 24px;
    padding: 6px 12px;
    background: #fff;
    gap: 8px;
  }
  .search-box input[type="text"] {
    border: none;
    outline: none;
    flex: 1;
    font-size: 14px;
    background: transparent;
  }
 

  /* 選択中タグエリア */
  .selected-tag-area {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 24px;
    margin-bottom: 12px;
  }
  .selected-tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #eaf3e7;
    border: 1px solid #a8cba0;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 13px;
    color: #3a5a3a;
  }
  .selected-tag-chip button {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: #888;
    padding: 0;
    line-height: 1;
  }

  /* タグボタン一覧 */
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .tag-btn {
    padding: 5px 12px;
    border: 1px solid #bbb;
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    color: #444;
  }
  .tag-btn.selected {
    opacity: 0.4;
  }
</style>


<br>
<h2 style="font-size:18px; font-weight:bold; color:#544739; margin-bottom:4px;">キーワード検索</h2>
<p style="font-size:12px; color:#666; margin-bottom:8px;">

  <a href="{% url 'board:topic_list' %}" style="color:#666;">掲示板top</a> ＞ 検索
</p>

<form method="get" action="{% url 'board:topic_search' %}">

{# カテゴリ選択（ラジオボタン） #}
<div style="font-size:13px; margin-bottom:12px;">
  <span style="margin-right:8px;">カテゴリ</span>
  <label style="margin-right:10px;">
  <input type="radio" name="category" value="" checked> すべて
</label>
  {% for value, label in categories %}
    <label style="margin-right:10px;">
      <input type="radio" name="category" value="{{ value }}"> {{ label }}
    </label>
  {% endfor %}
</div>

{# 検索ボックス #}
<div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
  <div class="search-box" style="flex:1; border:1px solid #aaa;">
    {% load static %}
    <img src="{% static 'images/サーチアイコン.png' %}" style="width:18px; height:18px; object-fit:contain; margin-right:8px;" alt="検索">
    <input type="text" name="q" placeholder="検索ワード" style="border:none; outline:none; flex:1; font-size:14px; background:transparent;">
  </div>
  <button type="submit" style="padding:6px 18px; background:#5a7a5a; color:#fff; border:none; border-radius:24px; font-size:14px; cursor:pointer; white-space:nowrap;">検索</button>
</div>

  {# 選択中タグ表示エリア #}
  <div class="selected-tag-area" id="selected-tags"></div>

  {# タグ一覧 #}
  <div class="tag-list" id="tag-list">
    {% for tag in tags %}
      <button type="button" class="tag-btn" data-tagname="{{ tag.name }}" onclick="toggleTag(this)">
        #{{ tag.name }}
      </button>
    {% endfor %}
  </div>

  {# 選択タグをhiddenで送る #}
  <div id="hidden-tags"></div>

</form>

<script>

  // タグ選択
  const selectedTags = [];

  function toggleTag(btn) {
    const tagName = btn.dataset.tagname;
    if (selectedTags.includes(tagName)) return;
    selectedTags.push(tagName);
    btn.classList.add("selected");
    updateSelectedTags();
  }

  function removeTag(name) {
    const index = selectedTags.indexOf(name);
    selectedTags.splice(index, 1);
    document.querySelectorAll(".tag-btn").forEach(btn => {
      if (btn.dataset.tagname === name) btn.classList.remove("selected");
    });
    updateSelectedTags();
  }

  function updateSelectedTags() {
    const area = document.getElementById("selected-tags");
    area.innerHTML = selectedTags.map(name =>
      `<span class="selected-tag-chip">#${name}
        <button type="button" onclick="removeTag('${name}')">×</button>
      </span>`
    ).join("");

    const hiddenArea = document.getElementById("hidden-tags");
    hiddenArea.innerHTML = selectedTags.map(name =>
      `<input type="hidden" name="tag" value="${name}">`
    ).join("");
  }
</script>

{% endblock %}

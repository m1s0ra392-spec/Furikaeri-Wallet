{# 外側のdiv：justify-content を追加、flex-wrapはwrapに戻す #}
<div style="
  display: flex;
  gap: 6px;
  margin: 12px 0 16px;
  flex-wrap: wrap;
">

  <a href="{% url 'board:mypage_likes' %}"
     style="
       {# ↓ flex:1 を削除。padding を左右に少し広げる #}
       padding: 8px 12px;
       border-radius: 10px;
       text-decoration: none;
       font-size: 13px;
       white-space: nowrap;
       {% if tab == 'likes' %}
         border: 2px solid #6a9e6a;
         background: #e8f3e8;
         color: #3a6e3a;
         font-weight: bold;
       {% else %}
         border: 1px solid #ccc;
         background: #fff;
         color: #555;
       {% endif %}
     ">
    私のいいね
  </a>

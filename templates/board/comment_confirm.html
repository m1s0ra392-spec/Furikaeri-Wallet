{% extends "base_board.html" %}
{% block board_content %}
<br>
<br>
<style>
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  
  .box {
    white-space: pre-wrap;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    margin-top: 4px;
  }
</style>
<h2 style="font-size:18px; ...">コメント投稿確認</h2>
<p>こちらの内容でよろしいですか？</p>
<p style="font-size:13px; color:#555;">「{{ topic.title }}」へのコメント</p>

  <div style="margin:16px 0;">
  <div><strong>返信番号（任意）</strong></div>
  <div class="box">{{ form.reply_to.value|default:"（なし）" }}</div>

  <div class="muted" style="margin-top:10px;">コメント本文</div>
  <div class="box">{{ form.text.value }}</div>

  <form method="post" action="{% url 'board:comment_confirm' topic_pk=topic.id %}"
      onsubmit="if(this.dataset.submitted){return false;} this.dataset.submitted='true';">
    {% csrf_token %}

    {# 入力値を次のPOSTに持ち越す（超重要） #}
    <input type="hidden" name="reply_to" value="{{ form.reply_to.value|default_if_none:'' }}">
    <input type="hidden" name="text" value="{{ form.text.value|default_if_none:'' }}">

    <div class="btn-row">
      <button type="submit" name="action" value="post"
              style="padding:10px 14px; border-radius:10px; border:1px solid #5a7a5a; background:#5a7a5a; color:#fff; cursor:pointer; font-weight:700;">
        {% if mode == "edit" %}コメントを更新する{% else %}投稿する{% endif %}
      </button>
      <button type="submit" name="action" value="back"
              style="padding:10px 14px; border-radius:10px; border:2px solid #5a7a5a; background:#fff; color:#5a7a5a; cursor:pointer; font-weight:700;">
        戻る
      </button>    
    </div>
  </form>
</div>
{% endblock %}

{% extends "base_auth.html" %}

{% block title %}パスワード再設定完了{% endblock %}

{% block content %}

<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="w-100 text-center" style="max-width: 390px; padding: 2rem;">

    <h1 class="mb-4" style="font-size: 1.2rem; color: #4a4a4a;">パスワードを再設定しました</h1>

    <p style="font-size: 0.9rem; color: #4a4a4a;">
      新しいパスワードでログインしてください。
    </p>

    <div class="d-grid mt-4">
      <a href="{% url 'login' %}" class="btn"
        style="background-color: #5a8a5a; color: white; border-radius: 8px; padding: 0.7rem;">
        ログイン画面へ
      </a>
    </div>

  </div>
</div>

{% endblock %}

{% extends "base_auth.html" %}

{% block title %}パスワード再設定{% endblock %}

{% block content %}

<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="w-100" style="max-width: 390px; padding: 2rem;">

    <h1 class="text-center mb-3" style="font-size: 1.3rem; color: #4a4a4a;">パスワード再設定</h1>

    <p class="text-center mb-4" style="font-size: 0.85rem; color: #4a4a4a; line-height: 1.8;">
      パスワードを忘れた場合は、こちらから再設定できます。<br>
      ご登録のメールアドレスを入力してください。
    </p>

    <form method="post">
      {% csrf_token %}

      <div class="mb-3 d-flex flex-column align-items-center">
        <label class="form-label d-block align-self-start" style="font-size: 0.9rem;">メールアドレス</label>
        {{ form.email }}
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn"
          style="background-color: #5a7a5a; color: white; border-radius: 8px; padding: 0.7rem;">
          送信
        </button>
      </div>
    </form>

    <p class="text-center mt-3">
      <a href="{% url 'login' %}" style="font-size: 0.85rem; color: #5a7a5a;">ログイン画面へ戻る</a>
    </p>

  </div>
</div>

{% endblock %}

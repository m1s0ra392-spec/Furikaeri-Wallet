{% extends "base_auth.html" %}

{% block title %}パスワード再設定メール送信{% endblock %}

{% block content %}

<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="w-100 text-center" style="max-width: 390px; padding: 2rem;">

    <h1 class="mb-4" style="font-size: 1.2rem; color: #4a4a4a;">
      パスワード再設定メール<br>を送信しました
    </h1>

    <p style="font-size: 0.9rem; color: #4a4a4a; line-height: 1.8;">
      ご登録のメールアドレス宛に、パスワード再設定用のリンクを送信しました。<br>
      メール本文に記載のURLから<br>
      <span style="text-decoration: underline;">60分以内</span>に新しいパスワードを設定完了してください。
    </p>

    <p class="mt-4">
      <a href="{% url 'login' %}" style="font-size: 0.85rem; color: #5a8a5a;">ログイン画面へ戻る</a>
    </p>

  </div>
</div>

{% endblock %}

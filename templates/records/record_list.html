{% extends "base.html" %}

{% block content %}
<div style="max-width:420px; margin:0 auto; padding:0 12px;">

  <!-- ===== 月ナビゲーション ===== -->
  <div style="display:flex; align-items:center; justify-content:space-between;
              padding:12px 0; font-size:16px; font-weight:bold;">
    <a href="?year={{ prev_year }}&month={{ prev_month }}"
       style="text-decoration:none; font-size:20px; padding:4px 10px;">◁</a>
    <span>{{ year }}年 {{ month }}月</span>
    <a href="?year={{ next_year }}&month={{ next_month }}"
       style="text-decoration:none; font-size:20px; padding:4px 10px;">▷</a>
  </div>

  <!-- ===== カレンダー ===== -->
  <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
    <thead>
      <tr>
        {% for label in "日月火水木金土" %}
          <th style="text-align:center; padding:4px 0; font-size:12px;
                     color:{% if forloop.first %}#c0392b{% elif forloop.last %}#2980b9{% else %}#555{% endif %};">
            {{ label }}
          </th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for week in calendar %}
        <tr>
          {% for day in week %}
            <td style="border:1px solid #e0e0e0; vertical-align:top;
                       min-height:52px; padding:3px 2px; font-size:11px;
                       {% if day == today.day and year == today.year and month == today.month %}
                         background:#fffde7;
                       {% endif %}">
              {% if day != 0 %}
                <!-- 日付タップでモーダルを開く -->
                <div onclick="openDayModal({{ day }})"
                     style="cursor:pointer; min-height:48px;">
                  <div style="text-align:right; font-size:12px; font-weight:bold;
                               color:{% if forloop.first %}#c0392b{% elif forloop.last %}#2980b9{% else %}#333{% endif %};">
                    {{ day }}
                  </div>
                  <!-- その日の記録：JSで🌱合計・🍂合計を描画 -->
                  <div class="cal-icons" data-day="{{ day }}" style="margin-top:2px;"></div>
              {% endif %}
            </td>
          {% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>

</div><!-- /max-width -->


<!-- ===== モーダル（<form> の外に置く！） ===== -->
<div id="day-modal-overlay"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9000;"
     onclick="closeDayModal(event)">

  <div id="day-modal"
       style="position:absolute; bottom:0; left:50%; transform:translateX(-50%);
              width:min(100vw, 440px); background:#fff; border-radius:16px 16px 0 0;
              max-height:70vh; overflow-y:auto; padding:16px;">

    <!-- ヘッダー -->
    <div style="display:flex; justify-content:space-between; align-items:center;
                margin-bottom:12px;">
      <span id="modal-title" style="font-weight:bold; font-size:16px;"></span>
      <button onclick="closeDayModal()"
              style="border:none; background:none; font-size:20px; cursor:pointer;">×</button>
    </div>

    <!-- 記録リスト（JS で書き換える） -->
    <div id="modal-records"></div>


  </div>
</div>


<!-- ===== JavaScript ===== -->
<script>
// Django の records_by_day をJSで使えるように変換
const recordsByDay = {
  {% for d, recs in records_by_day.items %}
    {{ d }}: [
      {% for r in recs %}
        {
          pk:       {{ r.pk }},
          type:     {{ r.category.type }},
          category: "{{ r.category.name }}",
          amount:   {{ r.amount }},
          memo:     "{{ r.memo|escapejs }}",
          editUrl:  "{% url 'records:record_update' r.pk %}",
          deleteUrl:"{% url 'records:record_delete' r.pk %}",
        },
      {% endfor %}
    ],
  {% endfor %}
};

const year  = {{ year }};
const month = {{ month }};

// ===== カレンダーマスにアイコンを描画 =====
document.querySelectorAll(".cal-icons").forEach(el => {
  const day = parseInt(el.dataset.day);
  const recs = recordsByDay[day] || [];
  if (recs.length === 0) return;

  // 🌱と🍂それぞれの合計を計算
  let successTotal = 0;
  let regretTotal  = 0;
  recs.forEach(r => {
    if (r.type === 0) successTotal += r.amount;
    else              regretTotal  += r.amount;
  });

  let html = "";
  if (successTotal > 0) {
    html += `<div style="font-size:10px; line-height:1.4; color:#27ae60;">🌱${successTotal}</div>`;
  }
  if (regretTotal > 0) {
    html += `<div style="font-size:10px; line-height:1.4; color:#e74c3c;">🍂${regretTotal}</div>`;
  }
  el.innerHTML = html;
});

function openDayModal(day) {
  // タイトル
  document.getElementById("modal-title").textContent =
    `${year}年${month}月${day}日の記録`;


  // 記録リストを組み立て
  const container = document.getElementById("modal-records");
  const recs = recordsByDay[day] || [];

  if (recs.length === 0) {
    container.innerHTML = '<p style="color:#888; text-align:center;">この日の記録はありません</p>';
  } else {
    container.innerHTML = recs.map(r => `
      <div style="border:1px solid #eee; border-radius:8px; padding:10px;
                  margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
        <a href="${r.editUrl}" style="text-decoration:none; color:inherit; flex:1;">
          <div style="font-size:13px; color:${r.type===0 ? '#27ae60':'#e74c3c'}; font-weight:bold;">
            ${r.type===0 ? '🌱':'🍂'} ${r.category}｜${r.amount}円
          </div>
          <div style="font-size:12px; color:#666; margin-top:3px;">${r.memo || '（メモなし）'}</div>
        </a>
        <a href="${r.deleteUrl}"
           style="margin-left:10px; font-size:18px; text-decoration:none;">🗑️</a>
      </div>
    `).join("");
  }

  document.getElementById("day-modal-overlay").style.display = "block";
}

function closeDayModal(e) {
  // オーバーレイ部分クリック、または × ボタン
  if (!e || e.target === document.getElementById("day-modal-overlay")) {
    document.getElementById("day-modal-overlay").style.display = "none";
  }
}
</script>

{% endblock %}
